<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Sản phẩm</title>
  </head>
  <body>
    <table id="product-table">
      <thead>
        <tr>
          <th>STT</th>
          <th id="product-name" class="sortable">
            Tên sản phẩm
            <span id="sort-icon"></span>
          </th>
          <th>Danh mục</th>
          <th>Đơn giá</th>
          <th>Số lượng</th>
        </tr>
      </thead>
      <tbody id="product-list"></tbody>
    </table>

    <div id="add-product">
      <input id="input-name" required minlength="3" />
      <input id="input-category" />
      <input id="input-price" required min="1" />
      <input id="input-quantity" required min="1" />
      <button id="btn-add" />
    </div>
  </body>
  <script>
    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4 && xhr.status === 200) {
        const products = JSON.parse(xhr.responseText);

        const tbody = document.getElementById("product-list");
        let htmlContent = "";
        products.forEach((product) => {
          htmlContent += `
          <tr>
            <td>${product.id}</td>
            <td>${product.name}</td>
            <td>${product.category}</td>
            <td>${product.price}</td>
            <td>${product.quantity}</td>
          </tr>
        `;
        });

        tbody.innerHTML = htmlContent;
      }
    };
    xhr.open("GET", "products.json");
    xhr.send();

    const thName = document.getElementById("product-name");
    const sortIcon = document.getElementById("sort-icon");
    const tbody = document.getElementById("product-list");

    let isAscending = true;

    thName.addEventListener("click", () => {
      const rows = Array.from(tbody.querySelectorAll("tr"));

      rows.sort((rowA, rowB) => {
        const nameA = rowA.cells[1].innerText.trim();
        const nameB = rowB.cells[1].innerText.trim();

        if (isAscending) {
          return nameA.localeCompare(nameB);
        } else {
          return nameB.localeCompare(nameA);
        }
      });

      rows.forEach((row) => {
        tbody.appendChild(row);
      });

      sortIcon.innerText = isAscending ? " ▲" : " ▼";

      isAscending = !isAscending;
    });

    function addProduct() {
      const inputName = document.getElementById("input-name");
      const inputCategory = document.getElementById("input-category");
      const inputPrice = document.getElementById("input-price");
      const inputQuantity = document.getElementById("input-quantity");

      const nameValue = inputName.value.trim();
      const categoryValue = inputCategory.value.trim();
      const priceValue = inputPrice.value.trim();
      const quantityValue = inputQuantity.value.trim();

      const tbody = document.getElementById("product-list");

      const currentRowsCount = tbody.querySelectorAll("tr").length;
      const newStt = currentRowsCount + 1;

      const newRow = document.createElement("tr");
      newRow.innerHTML = `
        <td>${newStt}</td>
        <td>${nameValue}</td>
        <td>${categoryValue}</td>
        <td>${priceValue}</td>
        <td>${quantityValue}</td>
      `;

      tbody.appendChild(newRow);

      inputName.value = "";
      inputPrice.value = "";
      inputQuantity.value = "";
      if (inputCategory) {
        inputCategory.selectedIndex = 0;
      }
    }
    const btnAdd = document.getElementById("btn-add");

    btnAdd.addEventListener("click", addProduct);
  </script>
</html>
